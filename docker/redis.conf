# ──────────────────────────────────────────────────
# BuildMart Redis Configuration
# Tuned for BullMQ job queues + session caching
# ──────────────────────────────────────────────────

# Persistence — RDB snapshot every 60s if ≥1 key changed
save 60 1
save 300 10
save 900 1

# AOF for durability (job queues must survive restarts)
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no

# Memory management
maxmemory 512mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice

# Disable dangerous commands in dev
rename-command FLUSHALL ""
rename-command FLUSHDB  ""
rename-command DEBUG    ""
rename-command CONFIG   "CONFIG_DEV_ONLY"

# Queues used by BuildMart:
#   buildmart:notifications   — WhatsApp / SMS / Email
#   buildmart:matching        — RFQ geo-matching engine
#   buildmart:payouts         — Razorpay vendor payouts
#   buildmart:kyc             — KYC document validation
